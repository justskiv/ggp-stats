// ===== ROUTING =====

function useRoute() {
  const parse = (hash) => {
    if (!hash || hash === "#" || hash === "#/") return { page: "list" };
    const m = hash.match(/^#\/(.+)$/);
    return m ? { page: "episode", id: m[1] } : { page: "list" };
  };
  const [route, setRoute] = useState(parse(window.location.hash));
  useEffect(() => {
    const h = () => setRoute(parse(window.location.hash));
    window.addEventListener("hashchange", h);
    return () => window.removeEventListener("hashchange", h);
  }, []);
  return route;
}

// ===== DYNAMIC DATA LOADING =====

function useEpisodeData(id) {
  const [state, setState] = useState({ loading: false, data: null, error: null });
  useEffect(() => {
    if (!id) return;
    if (window.GGP_EPISODES[id]) {
      setState({ loading: false, data: window.GGP_EPISODES[id], error: null });
      return;
    }
    setState({ loading: true, data: null, error: null });
    const s = document.createElement("script");
    s.src = "episodes/" + id + "/data.js";
    s.onload = () => {
      if (window.GGP_EPISODES[id]) {
        setState({ loading: false, data: window.GGP_EPISODES[id], error: null });
      } else {
        setState({ loading: false, data: null, error: "no-data" });
      }
    };
    s.onerror = () => setState({ loading: false, data: null, error: "load-failed" });
    document.head.appendChild(s);
  }, [id]);
  return state;
}

};

  return React.createElement("text", {
    x: cx + r * Math.cos(-midAngle * R), y: cy + r * Math.sin(-midAngle * R),
    fill: "white", textAnchor: "middle", dominantBaseline: "central", fontSize: 13, fontWeight: 600
  }, `${(percent * 100).toFixed(1)}%`);
};

function pluralize(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;

// ===== EPISODE VIEW (loader wrapper) =====

function EpisodeView({ id }) {
  const { loading, data, error } = useEpisodeData(id);
  if (loading || (!data && !error)) return React.createElement(LoadingScreen);
  if (error) return React.createElement(ErrorScreen, { id: id });
  return React.createElement(Dashboard, { data: data });
}

// ===== APP (router) =====

function App() {
  const route = useRoute();
  if (route.page === "episode") return React.createElement(EpisodeView, { id: route.id });
  return React.createElement(EpisodeList);
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
